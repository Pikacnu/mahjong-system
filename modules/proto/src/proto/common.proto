syntax = "proto3";

package mahjong.common.v1;
import "google/protobuf/struct.proto";


// ErrorCode defines common error codes for RPC responses.
enum ErrorCode {
  NONE             = 0;
  NOT_FOUND        = 1;
  INVALID_ARGUMENT = 2;
  INTERNAL_ERROR   = 3;
  ALREADY_EXISTS   = 4;
  PERMISSION_DENIED = 5;
  INVALID_ACTION   = 7;
}

// Standard Error Envelope to be used in all Responses
message ApiError {
  ErrorCode code = 1;
  string message = 2;
  google.protobuf.Struct details = 3;  // Optional extra payload encoded via encodeToBytes
}

// ExecuteResourceType indicates the type of resource being executed, such as a function or module.
enum ExecuteResourceType {
  FUNCTION = 0;
  MODULE   = 1;
}