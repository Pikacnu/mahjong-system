syntax = "proto3";

package mahjong.runner.v1;
import "google/protobuf/empty.proto";

// FunctionInfo represents the metadata for a function,
// including its name and version.
message FunctionInfo {
  string name    = 1;
  int32  version = 2;
}

// FunctionRequest contains the information needed to execute a function,
// including its name, version, and arguments.
message FunctionRequest {
  FunctionInfo function_info = 1;
  message Payload {
    bytes          this = 1;
    repeated bytes args = 2;
  }
  Payload payload = 2;
}

// FunctionResponse contains the result of executing a function,
// or an error code if execution failed.
message FunctionResponse {
  bytes result = 1;
}

// CreateLiveModuleRequest contains the information needed to create a live module,
// including its name and version. The runner fetches code from storage.
message CreateLiveModuleRequest {
  LiveModuleManifest manifest = 1;
}

// LiveModuleManifest represents the metadata for a live module,
// including its name and version.
message LiveModuleManifest {
  string name    = 1;
  int32  version = 2;
}

// CreateLiveModuleResponse contains the result of creating a live module,
// including the module ID or an error code if creation failed.
message CreateLiveModuleResponse {
  string module_id = 1;
}

// LiveModuleRunRequest contains the information needed to execute a live module,
// including its module ID and arguments.
message LiveModuleRunRequest {
  string module_id = 1;
  message Payload {
    bytes          this = 1;
    repeated bytes args = 2;
  }
  Payload payload       = 2;
  string  function_name = 3; // Optional: specify a function within the module to run, if applicable.
}

// RemoveLiveModuleRequest contains the information needed to remove a live module,
// including its module ID.
message RemoveLiveModuleRequest {
  string module_id = 1;
}

// SetLiveModuleValueRequest contains the information needed to set a value in a live module,
// including the module ID, key, and value.
message SetLiveModuleValueRequest {
  string module_id = 1;
  string key       = 2;
  bytes  value     = 3;
}

// GetLiveModuleValueRequest contains the information needed to get a value from a live module,
// including the module ID and key.
message GetLiveModuleValueRequest {
  string module_id = 1;
  string key       = 2;
}

// GetLiveModuleValueResponse contains the value retrieved from a live module,
// or an error code if retrieval failed.
message GetLiveModuleValueResponse {
  bytes value = 1;
}

// RunnerService provides RPC endpoints for executing Mahjong functions.
service RunnerService {
  // RunFunction executes a function with name / version / args
  // and returns the result or error code.
  rpc RunFunction(FunctionRequest) returns (FunctionResponse);
  // CreateLiveModule creates a live module with the given name, version, and code.
  rpc CreateLiveModule(CreateLiveModuleRequest) returns (CreateLiveModuleResponse);
  // CallLiveModuleFn executes a live module with the given module ID and arguments.
  rpc CallLiveModuleFn(LiveModuleRunRequest) returns (FunctionResponse);
  // RemoveLiveModule removes a live module with the given module ID.
  rpc RemoveLiveModule(RemoveLiveModuleRequest) returns (google.protobuf.Empty);
  // SetLiveModuleValue sets a value in a live module with the given module ID, key, and value.
  rpc SetLiveModuleValue(SetLiveModuleValueRequest) returns (google.protobuf.Empty);
  // GetLiveModuleValue gets a value from a live module with the given module ID and key.
  rpc GetLiveModuleValue(GetLiveModuleValueRequest) returns (GetLiveModuleValueResponse);
}