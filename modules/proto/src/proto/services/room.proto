syntax = "proto3";

package mahjong.game_server.v1;
import "common.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";

enum RoomStatus {
  WAITING = 0;
  IN_PROGRESS = 1;
  FINISHED = 2;
}

enum Event {
  GAME_START = 0;
  GAME_END = 1;
  ROUND_START = 2;
  ROUND_END = 3;
  ROUND_STATUS_CHANGED = 4;
  CHANGE_PLAYER_HAND = 5;

  PLAYER_DRAWS_TILE = 100;
  PLAYER_DISCARDS_TILE = 101;
  PLAYER_CHI = 102;
  PLAYER_PON = 103;
  PLAYER_KAN = 104;
  PLAYER_RON = 105;
  PLAYER_TSUMO = 106;
  PLAYER_RIICHI = 107;

  PLAYER_GETS_TILE = 200;

  SHOW_ACTIONS = 300;
  SHOW_AVAILABLE_ACTIONS = 301;
  SHOW_HINT = 302;
  SHOW_ERROR = 303;
  SHOW_INFO = 304;

  PLAYER_CONNECTED = 400;
  PLAYER_DISCONNECTED = 401;
  PLAYER_JOINED = 402;
  PLAYER_LEFT = 403;
  CONNECTION_ESTABLISH = 404;
}

message CreateGameRequest {
  int32 game_id = 2;
}

message CreateGameResponse {
  bool success = 1;
  oneof result {
    int32 game_id = 2;
    mahjong.common.v1.ApiError error = 3;
  }
}

message SendGameEventRequest {
  int32 game_id = 1;
  Event event = 2;
  google.protobuf.Struct payload = 3;
}

message SendGameEventResponse {
  bool success = 1;
  oneof result {
    google.protobuf.Empty data = 2;
    mahjong.common.v1.ApiError error = 3;
  }
}

message GameChannelInfo {
  int32 game_id = 1;
}

message GameEventMessage {
  Event event = 1;
  optional google.protobuf.Struct payload = 2;
}

message ReactionMessage {
  Event event = 1;
  optional int32 player_id = 2;
  int32 game_id = 3;
  optional google.protobuf.Struct payload = 4;
}

service RoomServices {
  rpc CreateRoom (CreateGameRequest) returns (CreateGameResponse);
  rpc SendRoomEvent (SendGameEventRequest) returns (SendGameEventResponse);
  rpc SubscribeRoomEvents (GameChannelInfo) returns (stream GameEventMessage);
  rpc GameChannel (stream ReactionMessage) returns (stream ReactionMessage);
}
