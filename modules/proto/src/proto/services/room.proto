syntax = "proto3";

package mahjong.game_server.v1;
import "common.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "services/storage.proto";

enum RoomStatus {
  WAITING = 0;
  IN_PROGRESS = 1;
  FINISHED = 2;
}

enum Event {
  GAME_START = 0;
  GAME_END = 1;
  ROUND_START = 2;
  ROUND_END = 3;
  ROUND_STATUS_CHANGED = 4;
  CHANGE_PLAYER_HAND = 5;

  PLAYER_DRAWS_TILE = 6;
  PLAYER_DISCARDS_TILE = 7;
  PLAYER_CHI = 8;
  PLAYER_PON = 9;
  PLAYER_KAN = 10;
  PLAYER_RON = 11;
  PLAYER_TSUMO = 12;
  PLAYER_RIICHI = 13;

  PLAYER_GETS_TILE = 14;

  SHOW_ACTIONS = 15;
  SHOW_AVAILABLE_ACTIONS = 16;
  SHOW_HINT = 17;
  SHOW_ERROR = 18;
  SHOW_INFO = 19;

  PLAYER_CONNECTED = 20;
  PLAYER_DISCONNECTED = 21;
  PLAYER_JOINED = 22;
  PLAYER_LEFT = 23;
  CONNECTION_ESTABLISH = 24;
}

message CreateGameRequest {
  int32 game_id = 2;
}

message CreateGameResponse {
  bool success = 1;
  oneof result {
    int32 game_id = 2;
    mahjong.common.v1.ApiError error = 3;
  }
}

message SendGameEventRequest {
  int32 game_id = 1;
  Event event = 2;
  google.protobuf.Struct payload = 3;
}

message SendGameEventResponse {
  bool success = 1;
  oneof result {
    google.protobuf.Empty data = 2;
    mahjong.common.v1.ApiError error = 3;
  }
}

message GameChannelInfo {
  int32 game_id = 1;
}

message GameEventMessage {
  Event event = 1;
  optional google.protobuf.Struct payload = 2;
}

message ReactionMessage {
  Event event = 1;
  optional int32 player_id = 2;
  int32 game_id = 3;
  optional google.protobuf.Struct payload = 4;
}

message pluginManifest {
  string name = 1;
  string description = 2;
}

message AddPluginRequest {
  int32 game_id = 1;
  mahjong.code_storage.v1.MethodInfo pluginInfo = 2;
  int32 priority = 3;
}

message AddPluginResponse {
  bool success = 1;
  optional mahjong.common.v1.ApiError error = 2;
}

message RemovePluginRequest {
  int32 game_id = 1;
  mahjong.code_storage.v1.MethodInfo pluginInfo = 2;
}

message RemovePluginResponse {
  bool success = 1;
  optional mahjong.common.v1.ApiError error = 2;
}

message ListPluginsRequest {
  int32 game_id = 1;
}

message PluginInfoWithPriority {
  mahjong.code_storage.v1.MethodInfo pluginInfo = 1;
  int32 priority = 2;
}

message ListPluginsResponse {
  bool success = 1;
  repeated PluginInfoWithPriority pluginInfos = 2;
  optional mahjong.common.v1.ApiError error = 3;
}

service RoomServices {
  rpc CreateRoom (CreateGameRequest) returns (CreateGameResponse);
  rpc SendRoomEvent (SendGameEventRequest) returns (SendGameEventResponse);

  rpc SubscribeRoomEvents (GameChannelInfo) returns (stream GameEventMessage);
  rpc GameChannel (stream ReactionMessage) returns (stream ReactionMessage);

  rpc AddRoomPlugin (AddPluginRequest) returns (AddPluginResponse);
  rpc RemoveRoomPlugin (RemovePluginRequest) returns (RemovePluginResponse);
  rpc ListRoomPlugins (ListPluginsRequest) returns (ListPluginsResponse);
}
