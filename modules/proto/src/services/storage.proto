syntax = "proto3";

package mahjong.code_storage.v1;

import "common.proto";

// CodeInfo represents the metadata for a piece of code, including its name and version.
message CodeInfo {
  string name = 1;
  int32 version = 2;
}

// GetCodeInfoRequest retrieves the code for a given function name and version.
message GetCodeInfoRequest {
  CodeInfo code = 1;
}

message GetCodeInfoResponse {
  string code = 1;
  mahjong.common.v1.ErrorCode error = 2;
}

// GetCodeVersionRequest retrieves all available versions for a given function name.
message GetCodeVersionRequest {
  string name = 1;
}

// GetCodeVersionResponse returns all available versions for a given function name, 
// or an error code if not found.
message GetCodeVersionResponse {
  repeated int32 versions = 1;
  mahjong.common.v1.ErrorCode error = 2;
}

// GetCodeDataRequest retrieves the code for a given function name and version.
message GetCodeDataRequest {
  CodeInfo code = 1;
}

// GetCodeDataResponse returns the code string for the requested function and version, 
// or an error code if not found.
message GetCodeDataResponse {
  string code = 1;
  mahjong.common.v1.ErrorCode error = 2;
}

// StoreResourcesRequest stores the code for a given function name and version.
message StoreResourcesRequest {
  CodeInfo code = 1;
  string data = 2;
}

// StoreCodeResponse returns an error code indicating the success or failure of 
// the store operation.
message StoreResourcesResponse {
  mahjong.common.v1.ErrorCode error = 1;
}

// StorageService provides RPC endpoints for storing and retrieving Mahjong
// function code and resources (builtin modules, etc.).
service StorageService {
  // GetResourcesInfo retrieves code metadata for a given function name and version.
  rpc GetResourcesInfo(GetCodeInfoRequest) returns (GetCodeInfoResponse);
  // GetCodeVersion retrieves all available versions for a given function name.
  rpc GetResourcesVersions(GetCodeVersionRequest) returns (GetCodeVersionResponse);
  // GetCodeData retrieves the code for a given function name and version.
  rpc GetResourcesData(GetCodeInfoRequest) returns (GetCodeInfoResponse);
  // StoreResources stores the code for a given function name and version.
  // Note: This method can be used for both creating new code and updating existing code.
  rpc StoreResources(StoreResourcesRequest) returns (StoreResourcesResponse);
}