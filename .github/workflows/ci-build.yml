name: Build and push module images

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [ api-server, game-server, lobby-server, function-runner, function-storage ]
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository owner
        run: |
          echo "REPO_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: modules/${{ matrix.module }}
          file: modules/${{ matrix.module }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/mahjong-${{ matrix.module }}:${{ github.sha }}
            ghcr.io/${{ env.REPO_OWNER }}/mahjong-${{ matrix.module }}:latest
