{{- $root := . -}}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mahjong-system.fullname" $root }}-{{ $name }}
  labels:
    app.kubernetes.io/name: {{ include "mahjong-system.fullname" $root }}
    app.kubernetes.io/component: {{ $name }}
spec:
  replicas: {{ $root.Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "mahjong-system.fullname" $root }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "mahjong-system.fullname" $root }}
        app.kubernetes.io/component: {{ $name }}
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $svc.image.repository }}:{{ $svc.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ $svc.port }}
          env:
            - name: DATABASE_URL
{{- $pgHost := include "mahjong-system.postgresService" $root }}
              value: {{ printf "postgresql://%s:%s@%s:%d/%s" $root.Values.postgresql.username $root.Values.postgresql.password $pgHost $root.Values.postgresql.port $root.Values.postgresql.database | quote }}
          resources:
{{ toYaml (default $root.Values.resources $svc.resources) | indent 12 }}
{{- end }}
{{- end }}
