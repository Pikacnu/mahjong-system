{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "mahjong-system.fullname" . }}-migrate
spec:
  backoffLimit: 3
  template:
    metadata:
      name: {{ include "mahjong-system.fullname" . }}-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: "{{ .Values.migrations.image.repository }}:{{ .Values.migrations.image.tag }}"
          command: {{ toJson .Values.migrations.command }}
          env:
            - name: DATABASE_URL
              value: {{ printf "postgresql://%s:%s@%s:%d/%s" .Values.postgresql.username .Values.postgresql.password (include "mahjong-system.postgresService" .) .Values.postgresql.port .Values.postgresql.database | quote }}
      # Add serviceAccountName/volumes if required for your migration image
{{- end }}
